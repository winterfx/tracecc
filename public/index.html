<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TraceCC - Proxy Controller</title>
  <link rel="stylesheet" href="/shared/style.css">
</head>
<body>
  <nav class="nav-header">
    <span class="nav-logo">TRACECC</span>
    <div class="nav-links">
      <a href="/" class="nav-link nav-link--active">Proxy</a>
      <a href="/analyze" class="nav-link">Analyze</a>
    </div>
  </nav>

  <div class="container">
    <h1 class="page-title">Proxy Controller</h1>

    <div class="card">
      <div class="card-body">
        <div class="form-group">
          <label class="form-label">Target Domain</label>
          <input type="text" class="input" id="domain" placeholder="https://api.anthropic.com">
        </div>

        <div class="form-group">
          <label class="form-label">Bypass Paths (comma separated)</label>
          <input type="text" class="input" id="bypass" placeholder="/health, /metrics">
        </div>

        <div style="display:flex;gap:12px;margin-top:20px;">
          <button class="btn btn--primary" id="startBtn">START</button>
          <button class="btn btn--destructive" id="stopBtn" disabled>STOP</button>
          <span id="statusBadge" style="display:none;align-self:center;" class="badge badge--active">Active</span>
        </div>
      </div>
    </div>

    <!-- Log file info -->
    <div id="logFileCard" class="card mt-3" style="display:none;">
      <div class="card-body" style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <span style="color:var(--text-muted);font-size:11px;">Log file:</span>
          <code id="logFileName" style="margin-left:8px;color:var(--accent-teal);font-size:12px;"></code>
        </div>
        <a id="logFileLink" href="#" style="font-size:12px;">View Report &rarr;</a>
      </div>
    </div>

    <!-- Report ready -->
    <div id="reportCard" class="report-link-card" style="display:none;">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">Report generated:</div>
      <a id="reportLink" href="#" target="_blank">Open HTML Report &rarr;</a>
      <span style="margin-left:12px;">|</span>
      <a id="reportDownload" href="#" download style="margin-left:12px;font-size:12px;color:var(--accent-blue);">Download</a>
    </div>

    <!-- Log output -->
    <div class="card mt-3">
      <div class="card-header">System Log</div>
      <div class="log-output" id="logOutput">
        IDLE... Ready to start proxy.
      </div>
    </div>
  </div>

  <script type="module">
    import { fetchConfig, startProxy, stopProxy, generateReport } from '/shared/api.js'

    const domainEl = document.getElementById('domain')
    const bypassEl = document.getElementById('bypass')
    const startBtn = document.getElementById('startBtn')
    const stopBtn = document.getElementById('stopBtn')
    const statusBadge = document.getElementById('statusBadge')
    const logOutput = document.getElementById('logOutput')
    const logFileCard = document.getElementById('logFileCard')
    const logFileName = document.getElementById('logFileName')
    const logFileLink = document.getElementById('logFileLink')
    const reportCard = document.getElementById('reportCard')
    const reportLink = document.getElementById('reportLink')
    const reportDownload = document.getElementById('reportDownload')

    let currentLogFile = null

    function addLog(msg) {
      const ts = new Date().toLocaleTimeString()
      logOutput.innerHTML += `<br>[${ts}] ${msg}`
      logOutput.scrollTop = logOutput.scrollHeight
    }

    // Load defaults
    fetchConfig().then(data => {
      if (data.defaults) {
        if (data.defaults.domain) domainEl.value = data.defaults.domain
        if (data.defaults.bypassPaths) bypassEl.value = data.defaults.bypassPaths
      }
    }).catch(() => {})

    startBtn.addEventListener('click', async () => {
      const domain = domainEl.value
      if (!domain) { addLog('ERROR: Domain is required!'); return }
      startBtn.disabled = true
      try {
        const data = await startProxy(domain, bypassEl.value)
        if (data.success) {
          currentLogFile = data.logFile
          stopBtn.disabled = false
          statusBadge.style.display = 'inline-block'
          logOutput.innerHTML = `PROXY ACTIVE<br><span class="spinner"></span> Logging to: ${data.logFile}`
          addLog('Proxy started successfully!')

          logFileCard.style.display = 'block'
          logFileName.textContent = data.logFile
          logFileLink.href = `/report/${encodeURIComponent(data.logFile)}`
          reportCard.style.display = 'none'
        } else {
          addLog('ERROR: ' + data.error)
          startBtn.disabled = false
        }
      } catch (e) {
        addLog('ERROR: ' + e.message)
        startBtn.disabled = false
      }
    })

    stopBtn.addEventListener('click', async () => {
      stopBtn.disabled = true
      try {
        const data = await stopProxy()
        if (data.success) {
          startBtn.disabled = false
          statusBadge.style.display = 'none'
          addLog('Proxy stopped. Generating report...')

          // Generate HTML report
          try {
            const rep = await generateReport(currentLogFile)
            if (rep.success) {
              addLog('Report generated: ' + rep.htmlFile)
              reportCard.style.display = 'block'
              reportLink.href = '/' + rep.htmlFile
              reportDownload.href = '/' + rep.htmlFile
            }
          } catch (e) {
            addLog('Report generation failed: ' + e.message)
          }
        } else {
          addLog('ERROR: ' + data.error)
          stopBtn.disabled = false
        }
      } catch (e) {
        addLog('ERROR: ' + e.message)
        stopBtn.disabled = false
      }
    })
  </script>
</body>
</html>
